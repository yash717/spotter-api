<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="x-apple-disable-message-reformatting">
  <meta name="format-detection" content="telephone=no,address=no,email=no,date=no">
  <meta name="color-scheme" content="light">
  <meta name="supported-color-schemes" content="light">
  <title>{% block title %}Spotter AI{% endblock %}</title>
  <!--[if gte mso 9]>
  <xml>
    <o:OfficeDocumentSettings>
      <o:AllowPNG/>
      <o:PixelsPerInch>96</o:PixelsPerInch>
    </o:OfficeDocumentSettings>
  </xml>
  <![endif]-->
  <style>
    /* Reset styles */
    body { margin: 0 !important; padding: 0 !important; width: 100% !important; background-color: #f8f9fa !important; font-family: Arial, sans-serif !important; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table { border-collapse: collapse !important; mso-table-lspace: 0pt !important; mso-table-rspace: 0pt !important; }
    img { border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; -ms-interpolation-mode: bicubic; }
    a { text-decoration: none; }
    .ExternalClass { width: 100%; }
    .ExternalClass, .ExternalClass p, .ExternalClass span, .ExternalClass font, .ExternalClass td, .ExternalClass div { line-height: 100%; }
    @media only screen and (max-width: 600px) {
      .email-wrapper { width: 100% !important; }
      .email-container { width: 100% !important; }
      .mobile-padding { padding: 20px 15px !important; }
      .mobile-hide { display: none !important; }
      .button-mobile { width: 100% !important; max-width: 100% !important; }
    }
    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body style="margin: 0; padding: 0; width: 100%; background-color: #f8f9fa;">
<div style="display: none; font-size: 1px; color: #fefefe; line-height: 1px; max-height: 0px; max-width: 0px; opacity: 0; overflow: hidden;">{% block preview_text %}{% endblock %}</div>
<table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%" style="border-collapse: collapse; background-color: #f8f9fa;">
  <tr>
    <td align="center" style="padding: 20px 0;">
      <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="600" class="email-container" style="border-collapse: collapse; width: 100%; max-width: 600px; background-color: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);">
        
        <!-- Header -->
        <tr>
          <td align="center" style="padding: 0;">
            <div style="background: linear-gradient(135deg, #3bac75 0%, #2d8a5d 100%); background-color: #3bac75;">
              <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%" style="border-collapse: collapse;">
                <tr>
                  <td align="center" style="padding: 40px 20px 30px;">
                    <h1 style="margin: 0; padding: 0; font-size: 32px; font-weight: 700; color: #ffffff; font-family: Arial, sans-serif;">SPOTTER AI</h1>
                    <p style="margin: 10px 0 0 0; padding: 0; font-size: 14px; color: rgba(255, 255, 255, 0.9); font-family: Arial, sans-serif;">ELD Trip Planner</p>
                  </td>
                </tr>
                <tr>
                  <td style="height: 4px; background: linear-gradient(90deg, #49f1ba, #27a524); font-size: 0; line-height: 0;">&nbsp;</td>
                </tr>
              </table>
            </div>
          </td>
        </tr>

        <!-- Body Content -->
        <tr>
          <td style="padding: 40px;">
            {% block content %}{% endblock %}
          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td align="center" style="padding: 0;">
            <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%" style="border-collapse: collapse; background-color: #f8f9fa; border-top: 3px solid #3bac75;">
              <tr>
                <td style="padding: 40px 20px;">
                  {% block footer_content %}
                  <p style="margin: 0; padding: 0; font-size: 10px; color: #868e96; font-family: Arial, sans-serif; text-align: center;">
                    &copy; {{ current_year }} Spotter AI. All rights reserved.<br>
                    <a href="{{ support_url }}" style="color: #3bac75; text-decoration: none;">Support</a> | 
                    <a href="{{ privacy_url }}" style="color: #3bac75; text-decoration: none;">Privacy</a> | 
                    <a href="{{ terms_url }}" style="color: #3bac75; text-decoration: none;">Terms</a>
                  </p>
                  {% endblock %}
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
</body>
</html>
