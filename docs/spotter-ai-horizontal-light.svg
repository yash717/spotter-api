<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 272 64" fill="none" role="img" aria-label="Spotter AI">
  <defs>
    <filter id="pinGlowL" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeGlowL" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="pinFillL" cx="50%" cy="35%" r="60%">
      <stop offset="0%"  stop-color="#059669" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.03"/>
    </radialGradient>
    <radialGradient id="tipGlowL" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#059669" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ══════════════════════════════════════════════ -->
  <!--   MAP PIN MARK                                  -->
  <!-- ══════════════════════════════════════════════ -->

  <!-- Outer pulse rings -->
  <circle cx="24" cy="23" r="21"   stroke="#059669" stroke-width="0.7" opacity="0.12"/>
  <circle cx="24" cy="23" r="17.5" stroke="#059669" stroke-width="0.9" opacity="0.20"/>

  <!-- Pin glow -->
  <path d="M24,53 C11,42 10,37 10,23 A14,14 0 0,1 38,23 C38,37 37,42 24,53 Z"
        fill="#059669" opacity="0.07" filter="url(#pinGlowL)"/>

  <!-- Pin body -->
  <path d="M24,53 C11,42 10,37 10,23 A14,14 0 0,1 38,23 C38,37 37,42 24,53 Z"
        fill="url(#pinFillL)" stroke="#059669" stroke-width="1.6" stroke-linejoin="round"/>

  <!-- Inner highlight arc -->
  <path d="M14,18 A14,14 0 0,1 34,13" stroke="rgba(5,150,105,0.25)" stroke-width="1.2" stroke-linecap="round" fill="none"/>

  <!-- ── AI NEURAL TRIANGLE ── -->
  <line x1="24"   y1="14" x2="16.5" y2="28" stroke="#059669" stroke-width="0.9" opacity="0.55"/>
  <line x1="24"   y1="14" x2="31.5" y2="28" stroke="#059669" stroke-width="0.9" opacity="0.55"/>
  <line x1="16.5" y1="28" x2="31.5" y2="28" stroke="#059669" stroke-width="0.9" opacity="0.55"/>

  <!-- Nodes with glow -->
  <circle cx="24"   cy="14" r="3.2" fill="#059669" opacity="0.2" filter="url(#nodeGlowL)"/>
  <circle cx="16.5" cy="28" r="3.2" fill="#059669" opacity="0.2" filter="url(#nodeGlowL)"/>
  <circle cx="31.5" cy="28" r="3.2" fill="#059669" opacity="0.2" filter="url(#nodeGlowL)"/>

  <circle cx="24"   cy="14" r="2.2" fill="#059669"/>
  <circle cx="16.5" cy="28" r="2.2" fill="#059669"/>
  <circle cx="31.5" cy="28" r="2.2" fill="#059669"/>

  <!-- Centre AI dot -->
  <circle cx="24" cy="23" r="1.4" fill="rgba(5,150,105,0.65)"/>

  <!-- Pin tip -->
  <circle cx="24" cy="53" r="6"   fill="url(#tipGlowL)"/>
  <circle cx="24" cy="53" r="2.5" fill="#059669" opacity="0.45"/>

  <!-- ══════════════════════════════════════════════ -->
  <!--   WORDMARK                                      -->
  <!-- ══════════════════════════════════════════════ -->

  <!-- Thin divider line between icon and wordmark -->
  <line x1="52" y1="12" x2="52" y2="52" stroke="#E0E0E0" stroke-width="1"/>

  <text
    x="64" y="38"
    font-family="'Satoshi', 'Space Grotesk', 'Inter', system-ui, sans-serif"
    font-weight="700"
    font-size="26"
    letter-spacing="-0.5"
    fill="#0F172A">Spotter<tspan fill="#059669" dx="4">AI</tspan></text>

  <!-- Micro tagline -->
  <text
    x="65" y="52"
    font-family="'Satoshi', 'Inter', system-ui, sans-serif"
    font-weight="400"
    font-size="9"
    letter-spacing="3.5"
    fill="#A0A0A0">ELD TRIP PLANNER</text>

</svg>
